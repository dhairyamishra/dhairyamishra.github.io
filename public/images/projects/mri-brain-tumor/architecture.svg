<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0A0A0B"/>
  <text x="400" y="30" text-anchor="middle" fill="#F5F0EB" font-family="sans-serif" font-size="16" font-weight="bold">Shared Encoder Architecture</text>

  <!-- Input -->
  <rect x="30" y="150" width="120" height="80" rx="8" fill="#151315" stroke="#D45060" stroke-width="1.5"/>
  <text x="90" y="185" text-anchor="middle" fill="#F5F0EB" font-family="sans-serif" font-size="12">MRI Input</text>
  <text x="90" y="205" text-anchor="middle" fill="#B5A99A" font-family="sans-serif" font-size="10">4 modalities</text>

  <!-- Shared Encoder -->
  <rect x="200" y="120" width="160" height="140" rx="8" fill="#151315" stroke="#B8648A" stroke-width="1.5"/>
  <text x="280" y="165" text-anchor="middle" fill="#F5F0EB" font-family="sans-serif" font-size="12">Shared Encoder</text>
  <text x="280" y="185" text-anchor="middle" fill="#B5A99A" font-family="sans-serif" font-size="10">ResNet-50</text>
  <text x="280" y="205" text-anchor="middle" fill="#B5A99A" font-family="sans-serif" font-size="10">31.7M params</text>
  <text x="280" y="235" text-anchor="middle" fill="#D4AF37" font-family="sans-serif" font-size="10">Feature Maps</text>

  <!-- Classification Head -->
  <rect x="420" y="80" width="150" height="80" rx="8" fill="#151315" stroke="#D45060" stroke-width="1.5"/>
  <text x="495" y="115" text-anchor="middle" fill="#F5F0EB" font-family="sans-serif" font-size="12">Classification</text>
  <text x="495" y="135" text-anchor="middle" fill="#B5A99A" font-family="sans-serif" font-size="10">Tumor / No Tumor</text>

  <!-- Segmentation Head -->
  <rect x="420" y="220" width="150" height="80" rx="8" fill="#151315" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="495" y="255" text-anchor="middle" fill="#F5F0EB" font-family="sans-serif" font-size="12">Segmentation</text>
  <text x="495" y="275" text-anchor="middle" fill="#B5A99A" font-family="sans-serif" font-size="10">Pixel-level mask</text>

  <!-- Output Classification -->
  <rect x="630" y="80" width="130" height="80" rx="8" fill="#D45060" fill-opacity="0.15" stroke="#D45060" stroke-width="1"/>
  <text x="695" y="112" text-anchor="middle" fill="#D45060" font-family="sans-serif" font-size="14" font-weight="bold">91.3%</text>
  <text x="695" y="132" text-anchor="middle" fill="#B5A99A" font-family="sans-serif" font-size="10">Accuracy</text>

  <!-- Output Segmentation -->
  <rect x="630" y="220" width="130" height="80" rx="8" fill="#D4AF37" fill-opacity="0.15" stroke="#D4AF37" stroke-width="1"/>
  <text x="695" y="252" text-anchor="middle" fill="#D4AF37" font-family="sans-serif" font-size="14" font-weight="bold">76.5%</text>
  <text x="695" y="272" text-anchor="middle" fill="#B5A99A" font-family="sans-serif" font-size="10">Dice Score</text>

  <!-- Arrows -->
  <line x1="150" y1="190" x2="200" y2="190" stroke="#B8648A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="160" x2="420" y2="120" stroke="#D45060" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="220" x2="420" y2="260" stroke="#D4AF37" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="120" x2="630" y2="120" stroke="#D45060" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="260" x2="630" y2="260" stroke="#D4AF37" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Conditional arrow -->
  <path d="M570 120 L600 120 L600 260 L570 260" fill="none" stroke="#B8648A" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="612" y="195" text-anchor="middle" fill="#B8648A" font-family="sans-serif" font-size="8" transform="rotate(-90,612,195)">conditional</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B8648A"/>
    </marker>
  </defs>

  <!-- Legend -->
  <text x="400" y="370" text-anchor="middle" fill="#B5A99A" font-family="sans-serif" font-size="10">Dashed line: segmentation activates only when tumor detected (conditional inference)</text>
</svg>
